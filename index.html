    <style>
      :root {
        --accent: #87b59a;
        --bg: #f3f3f2;
        --text-main: #1f1f1f;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
        color: var(--text-main);
        background: #0a0a0a;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, Consolas, monospace;
      }

      #app {
        width: 100%;
        height: 100vh;
      }

      .splash-overlay {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(135, 181, 154, 0.1), transparent 30%),
          radial-gradient(circle at 82% 78%, rgba(135, 181, 154, 0.06), transparent 32%),
          linear-gradient(180deg, #060707 0%, #0a0a0a 52%, #040505 100%);
        display: grid;
        place-items: center;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, Consolas, monospace;
        transition: opacity 0.5s ease;
      }

      .splash-overlay.placeholder-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-terminal {
        position: relative;
        width: min(700px, 88vw);
        padding: 30px 34px 26px;
        display: grid;
        gap: 10px;
        border: 1px solid rgba(135, 181, 154, 0.18);
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(135, 181, 154, 0.07), rgba(8, 9, 9, 0.82)),
          rgba(7, 8, 8, 0.86);
        box-shadow:
          inset 0 0 0 1px rgba(135, 181, 154, 0.08),
          inset 0 20px 80px rgba(255, 255, 255, 0.02),
          0 24px 90px rgba(0, 0, 0, 0.4),
          0 0 42px rgba(135, 181, 154, 0.09);
        backdrop-filter: blur(18px);
        animation: splash-panel-breathe 2.8s ease-in-out infinite;
      }

      .splash-terminal::before {
        content: '';
        position: absolute;
        inset: 12px;
        border: 1px solid rgba(135, 181, 154, 0.08);
        border-radius: 18px;
        pointer-events: none;
      }

      .splash-terminal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(135, 181, 154, 0.12);
        color: rgba(135, 181, 154, 0.82);
        font-size: 0.76rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .splash-terminal-badges {
        display: inline-flex;
        gap: 8px;
        align-items: center;
      }

      .splash-badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(202, 244, 215, 0.92);
        box-shadow: 0 0 12px rgba(202, 244, 215, 0.45);
        animation: splash-dot-pulse 1.8s ease-in-out infinite;
      }

      .splash-badge-dot:nth-child(2) {
        animation-delay: 0.18s;
      }

      .splash-badge-dot:nth-child(3) {
        animation-delay: 0.36s;
      }

      .splash-title {
        margin: 0 0 2px;
        font-size: clamp(1.45rem, 2.4vw, 2rem);
        letter-spacing: 0.16em;
        color: rgba(226, 247, 233, 0.95);
        text-transform: uppercase;
      }

      .splash-subtitle {
        margin: 0 0 12px;
        font-size: 0.78rem;
        line-height: 1.6;
        letter-spacing: 0.14em;
        color: rgba(135, 181, 154, 0.62);
        text-transform: uppercase;
      }

      .splash-grid {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image:
          linear-gradient(rgba(135, 181, 154, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(135, 181, 154, 0.14) 1px, transparent 1px);
        background-size: 36px 36px;
        mask-image: radial-gradient(circle at center, black 42%, transparent 88%);
      }

      .splash-line {
        font-size: 0.95rem;
        color: rgba(135, 181, 154, 0.18);
        letter-spacing: 0.04em;
        min-height: 1.6em;
        transform: translateY(0);
        opacity: 0.72;
      }

      .splash-line.active {
        color: rgba(135, 181, 154, 0.72);
        animation: splash-line-pulse 1.25s ease-in-out infinite;
      }

      .splash-line.done {
        color: rgba(135, 181, 154, 0.92);
      }

      .splash-cursor {
        animation: splash-blink 0.8s step-end infinite;
        color: var(--accent);
      }

      .splash-bar-text {
        margin-left: 12px;
        letter-spacing: 0;
        font-size: 0.85rem;
        display: inline-block;
        min-width: 28ch;
      }

      .splash-progress {
        position: relative;
        margin-top: 14px;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(135, 181, 154, 0.12);
        box-shadow: inset 0 0 0 1px rgba(135, 181, 154, 0.1);
      }

      .splash-progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(135, 181, 154, 0.58), rgba(202, 244, 215, 0.95));
        box-shadow: 0 0 18px rgba(135, 181, 154, 0.4);
      }

      .splash-progress-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 10px;
        font-size: 0.74rem;
        letter-spacing: 0.08em;
        color: rgba(135, 181, 154, 0.76);
      }

      .splash-noise {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.06;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 100% 3px, 3px 100%;
        mix-blend-mode: screen;
        animation: splash-noise-drift 7s linear infinite;
      }

      .splash-mouse {
        position: fixed;
        top: 0;
        left: 0;
        width: 22px;
        height: 22px;
        transform: translate3d(-50%, -50%, 0);
        pointer-events: none;
        z-index: 2147483647;
        border: 1px solid rgba(202, 244, 215, 0.86);
        border-radius: 50%;
        box-shadow:
          0 0 0 1px rgba(135, 181, 154, 0.18),
          0 0 20px rgba(135, 181, 154, 0.18);
        background: rgba(135, 181, 154, 0.08);
        opacity: 0;
        transition: opacity 0.24s ease;
      }

      .splash-mouse.visible {
        opacity: 1;
      }

      .splash-mouse::before,
      .splash-mouse::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(202, 244, 215, 0.78);
      }

      .splash-mouse::before {
        width: 10px;
        height: 1px;
      }

      .splash-mouse::after {
        width: 1px;
        height: 10px;
      }

      .splash-mouse-ring {
        position: absolute;
        inset: -10px;
        border: 1px solid rgba(135, 181, 154, 0.18);
        border-radius: 50%;
        animation: splash-ring-pulse 1.8s ease-out infinite;
      }

      @keyframes splash-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }

      @keyframes splash-dot-pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.84); }
        50% { opacity: 1; transform: scale(1); }
      }

      @keyframes splash-line-pulse {
        0%, 100% {
          opacity: 0.72;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-1px);
        }
      }

      @keyframes splash-panel-breathe {
        0%, 100% {
          box-shadow:
            inset 0 0 0 1px rgba(135, 181, 154, 0.08),
            0 0 24px rgba(135, 181, 154, 0.06);
        }
        50% {
          box-shadow:
            inset 0 0 0 1px rgba(135, 181, 154, 0.14),
            0 0 40px rgba(135, 181, 154, 0.12);
        }
      }

      @keyframes splash-noise-drift {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(0, 12px, 0); }
      }

      @keyframes splash-ring-pulse {
        0% {
          opacity: 0.8;
          transform: scale(0.84);
        }
        100% {
          opacity: 0;
          transform: scale(1.22);
        }
      }
    </style>
    <title>纸间风景</title>
  </head>
  <body>
    <div id="startup-placeholder" class="splash-overlay" aria-hidden="true">
      <div class="splash-grid"></div>
      <div class="splash-noise"></div>
      <div class="splash-terminal">
        <div class="splash-terminal-head">
          <span>PAPER SCAPE BOOT</span>
          <span class="splash-terminal-badges">
            <span class="splash-badge-dot"></span>
            <span class="splash-badge-dot"></span>
            <span class="splash-badge-dot"></span>
          </span>
        </div>
        <h1 class="splash-title">PAPER SCAPE</h1>
        <p class="splash-subtitle">writing archive // audio cache // route bootstrap</p>
        <div class="splash-line done">&gt; SYSTEM INITIALIZATION...</div>
        <div class="splash-line done">&gt; LINKING CONTENT MODULES</div>
        <div class="splash-line done">&gt; CACHING AUDIO BUFFERS</div>
        <div class="splash-line active">&gt; LOADING KERNEL <span id="startup-bar-text" class="splash-bar-text">░░░░░░░░░░░░░░░░░░░░ 0%</span></div>
        <div class="splash-line done">&gt; CHECKSUM VERIFIED</div>
        <div class="splash-line done">&gt; BIO-SIGNAL SCAN...</div>
        <div class="splash-line active">&gt; BOOTSTRAP UI LAYER <span class="splash-cursor">_</span></div>
        <div class="splash-progress" aria-hidden="true">
          <div id="startup-progress-fill" class="splash-progress-fill"></div>
        </div>
        <div class="splash-progress-meta">
          <span>PRELOAD PIPELINE</span>
          <span id="startup-progress-label">0%</span>
        </div>
      </div>
      <div id="startup-mouse" class="splash-mouse" aria-hidden="true">
        <span class="splash-mouse-ring"></span>
      </div>
    </div>
    <div id="app"></div>
    <script>
      (function () {
        var start = Date.now();
        var duration = 1000;
        var fill = document.getElementById('startup-progress-fill');
        var label = document.getElementById('startup-progress-label');
        var barText = document.getElementById('startup-bar-text');
        var mouse = document.getElementById('startup-mouse');
        var frame = 0;
        var pointerX = window.innerWidth * 0.7;
        var pointerY = window.innerHeight * 0.38;
        var targetX = pointerX;
        var targetY = pointerY;

        if (mouse) {
          mouse.classList.add('visible');
          mouse.style.transform = 'translate3d(' + pointerX + 'px, ' + pointerY + 'px, 0) translate(-50%, -50%)';
        }

        window.addEventListener('mousemove', function (event) {
          targetX = event.clientX;
          targetY = event.clientY;
        }, { passive: true });

        function renderBar(percent) {
          var total = 20;
          var filled = Math.max(0, Math.min(total, Math.round((percent / 100) * total)));
          return '█'.repeat(filled) + '░'.repeat(total - filled) + ' ' + percent + '%';
        }

        function tick() {
          frame = window.requestAnimationFrame(tick);
          var elapsed = Date.now() - start;
          var progress = Math.max(0, Math.min(100, Math.round((elapsed / duration) * 100)));

          pointerX += (targetX - pointerX) * 0.16;
          pointerY += (targetY - pointerY) * 0.16;

          if (mouse) {
            mouse.style.transform = 'translate3d(' + pointerX + 'px, ' + pointerY + 'px, 0) translate(-50%, -50%)';
          }

          if (fill) fill.style.width = progress + '%';
          if (label) label.textContent = progress + '%';
          if (barText) barText.textContent = renderBar(progress);

          if (progress >= 100) {
            window.cancelAnimationFrame(frame);
          }
        }

        tick();
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
