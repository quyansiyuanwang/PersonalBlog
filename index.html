<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一个关于书写、设计与安静生活的个人博客，基于 Vue 3、Element Plus 与 Markdown 构建。" />
    <meta name="keywords" content="个人博客,Vue 3,Element Plus,Markdown,静态博客,写作" />
    <meta name="author" content="Lin" />
    <meta name="theme-color" content="#0f0e0c" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="纸间风景" />
    <meta property="og:description" content="一个关于书写、设计与安静生活的个人博客，基于 Vue 3、Element Plus 与 Markdown 构建。" />
    <meta property="og:image" content="/avatar-cover.svg" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="纸间风景" />
    <meta name="twitter:description" content="一个关于书写、设计与安静生活的个人博客，基于 Vue 3、Element Plus 与 Markdown 构建。" />
    <meta name="twitter:image" content="/avatar-cover.svg" />
    <style>
      :root {
        --accent: #87b59a;
        --bg: #f3f3f2;
        --text-main: #1f1f1f;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
        color: var(--text-main);
        background: #0a0a0a;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, Consolas, monospace;
      }

      #app {
        width: 100%;
        height: 100vh;
      }

      .splash-overlay {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        background: #0a0a0a;
        display: grid;
        place-items: center;
        font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, Consolas, monospace;
        transition: opacity 0.5s ease;
      }

      .splash-overlay.placeholder-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-terminal {
        width: min(600px, 85vw);
        padding: 40px;
        display: grid;
        gap: 8px;
      }

      .splash-line {
        font-size: 0.95rem;
        color: rgba(135, 181, 154, 0.18);
        letter-spacing: 0.04em;
        min-height: 1.6em;
      }

      .splash-line.active {
        color: rgba(135, 181, 154, 0.72);
      }

      .splash-line.done {
        color: rgba(135, 181, 154, 0.92);
      }

      .splash-cursor {
        animation: splash-blink 0.8s step-end infinite;
        color: var(--accent);
      }

      .splash-bar-text {
        margin-left: 12px;
        letter-spacing: 0;
        font-size: 0.85rem;
      }

      @keyframes splash-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
    <title>纸间风景</title>
  </head>
  <body>
    <div id="startup-placeholder" class="splash-overlay" aria-hidden="true">
      <div class="splash-terminal">
        <div class="splash-line done">&gt; SYSTEM INITIALIZATION...</div>
        <div class="splash-line active">&gt; LOADING KERNEL <span class="splash-bar-text">██████░░░░░░░░░░░░ 32%</span></div>
        <div class="splash-line">&nbsp;</div>
        <div class="splash-line active">&gt; BOOTSTRAP UI LAYER <span class="splash-cursor">_</span></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
